<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>⚽ Pronostics IA · CDM 2026</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#06090D;color:#DCE8F5;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}header{background:#0C1118;border-bottom:1px solid #1C2A38;padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0}.logo{width:34px;height:34px;background:linear-gradient(135deg,#00FF87,#38BFFF);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}.ht{font-size:18px;font-weight:700;color:#00FF87;letter-spacing:1px}.hs{font-size:10px;color:#4A6A85;margin-top:1px}.wc{margin-left:auto;background:#FFD70015;border:1px solid #FFD70044;border-radius:16px;padding:3px 10px;font-size:10px;color:#FFD700;display:flex;align-items:center;gap:4px;white-space:nowrap}.dot{width:6px;height:6px;border-radius:50%;background:#00FF87;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.main{flex:1;display:flex;overflow:hidden}#chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}.msg{display:flex;gap:8px;max-width:100%}.msg.user{flex-direction:row-reverse;margin-left:auto}.av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}.av.bot{background:#00FF8718;border:1px solid #00FF87}.av.user{background:#1C2A38;border:1px solid #1C2A38}.bubble{background:#0C1118;border:1px solid #1C2A38;border-radius:10px;padding:10px 13px;font-size:13px;line-height:1.6;max-width:calc(100% - 38px)}.msg.user .bubble{background:#00FF8710;border-color:#00FF8730}.card{background:#111820;border:1px solid #1C2A38;border-radius:12px;overflow:hidden;width:100%}.ch{background:linear-gradient(135deg,#0C1118,#16202C);border-bottom:1px solid #1C2A38;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}.ct{font-size:18px;font-weight:700;color:#DCE8F5}.cm{font-size:9px;color:#4A6A85;margin-top:2px}.wct{background:#FFD70015;border:1px solid #FFD70044;border-radius:4px;padding:2px 7px;font-size:9px;color:#FFD700;margin-top:3px;display:inline-block}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#1C2A38}.cell{background:#111820;padding:11px 8px;text-align:center}.cl{font-size:9px;color:#4A6A85;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}.cv{font-size:18px;font-weight:700}.cc{font-size:9px;margin-top:3px}.gh{color:#00FF87}.gm{color:#FFB800}.gl{color:#FF4560}.ab{border-top:1px solid #1C2A38;padding:11px 15px}.at{font-size:9px;color:#4A6A85;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}.ar{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:4px}.abar{width:55px;height:3px;background:#1C2A38;border-radius:2px;overflow:hidden}.af{height:100%;border-radius:2px;background:linear-gradient(90deg,#00FF87,#38BFFF)}.sc{border-top:1px solid #1C2A38;padding:9px 15px;display:flex;flex-wrap:wrap;gap:5px}.sc-lbl{width:100%;font-size:9px;color:#4A6A85;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}.chip{background:#06090D;border:1px solid #1C2A38;border-radius:16px;padding:3px 8px;font-size:10px;display:flex;align-items:center;gap:3px}.sp{font-size:9px;color:#00FF87}.vb{padding:10px 15px;border-top:1px solid #1C2A38;display:flex;align-items:center;gap:8px}.vbg{font-size:12px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:4px;border:1px solid;flex-shrink:0}.bw{color:#00FF87;border-color:#00FF87;background:#00FF8718}.bd{color:#FFB800;border-color:#FFB800;background:#FFB80011}.bl{color:#FF4560;border-color:#FF4560;background:#FF456011}.src{border-top:1px solid #1C2A38;padding:6px 15px;display:flex;flex-wrap:wrap;gap:3px;align-items:center}.stag{font-size:9px;color:#38BFFF;background:#38BFFF0D;border:1px solid #38BFFF2A;border-radius:3px;padding:1px 5px}.sbar{display:flex;align-items:center;gap:6px;font-size:10px;color:#38BFFF;padding:6px 10px;background:#38BFFF0D;border:1px solid #38BFFF2A;border-radius:7px;margin-bottom:6px}.spin{width:9px;height:9px;border:2px solid #38BFFF33;border-top-color:#38BFFF;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.tdots{display:flex;gap:4px;padding:10px 13px;background:#0C1118;border:1px solid #1C2A38;border-radius:10px}.tdots span{width:5px;height:5px;border-radius:50%;background:#00FF87;animation:bounce 1.2s infinite}.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}.inp{background:#0C1118;border-top:1px solid #1C2A38;padding:10px 14px;flex-shrink:0}.qb{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}.qbtn{background:#111820;border:1px solid #1C2A38;color:#4A6A85;padding:4px 9px;border-radius:16px;font-size:10px;cursor:pointer}.qbtn.wc{border-color:#FFD70033;color:#FFD700;background:#FFD70010}.ir{display:flex;gap:7px;align-items:flex-end}textarea{flex:1;background:#111820;border:1px solid #1C2A38;border-radius:8px;color:#DCE8F5;font-size:13px;padding:8px 11px;resize:none;min-height:38px;max-height:90px;outline:none}textarea:focus{border-color:#00FF87}textarea::placeholder{color:#4A6A85}#sb{background:#00FF87;color:#06090D;border:none;border-radius:8px;width:38px;height:38px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}#sb:disabled{background:#1C2A38;cursor:not-allowed}.disc{font-size:9px;color:#4A6A85;text-align:center;padding:4px 0 0}</style></head><body><header><div class="logo">⚽</div><div><div class="ht">PRONOSTICS IA</div><div class="hs">RECHERCHE WEB · CDM 2026</div></div><div class="wc"><div class="dot"></div>🏆 CDM 2026</div></header><div class="main"><div id="chat"><div class="msg bot"><div class="av bot">🤖</div><div class="bubble"><strong style="color:#00FF87">Pronostics IA</strong> en ligne ! 🔥<br><br>Je recherche sur le web en temps réel — <span style="color:#FFD700">🏆 CDM 2026</span> incluse !<br><br><em style="color:#4A6A85">Tape un match ci-dessous 👇</em></div></div></div></div><div class="inp"><div class="qb"><button class="qbtn wc" onclick="ask('Mexique vs Afrique du Sud CDM 2026')">🇲🇽 Mexique-AfdSud</button><button class="qbtn wc" onclick="ask('Pays-Bas vs Japon CDM 2026')">🇳🇱 Oranje-Japon</button><button class="qbtn wc" onclick="ask('France vs Sénégal CDM 2026')">🇫🇷 France-Sénégal</button><button class="qbtn wc" onclick="ask('Brésil vs Maroc CDM 2026')">🇧🇷 Brésil-Maroc</button><button class="qbtn" onclick="ask('Real Madrid vs Barcelona')">🇪🇸 Clásico</button></div><div class="ir"><textarea id="inp" placeholder="Équipe A vs Équipe B..." rows="1" onkeydown="hk(event)" oninput="rs(this)"></textarea><button id="sb" onclick="send()">➤</button></div><p class="disc">⚠️ Pronostics indicatifs · Jouer avec modération</p></div><script>const chat=document.getElementById('chat'),inp=document.getElementById('inp'),sb=document.getElementById('sb');let load=false;function rs(e){e.style.height='auto';e.style.height=Math.min(e.scrollHeight,90)+'px'}function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}function ask(t){inp.value=t;rs(inp);send()}function cc(v){return v>=70?'gh':v>=50?'gm':'gl'}function col(v){return v>=70?'#00FF87':v>=50?'#FFB800':'#FF4560'}function bc(v){const s=v.toLowerCase();if(s==='1'||s.includes('victoire'))return'bw';if(s==='x'||s.includes('nul'))return'bd';return'bl'}function add(role,html){const d=document.createElement('div');d.className='msg '+role;const av=document.createElement('div');av.className='av '+role;av.textContent=role==='bot'?'🤖':'👤';const bu=document.createElement('div');bu.className='bubble';bu.innerHTML=html;d.appendChild(av);d.appendChild(bu);chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}function showTyping(){const d=document.createElement('div');d.className='msg bot';d.id='typ';d.innerHTML='<div class="av bot">🤖</div><div><div class="sbar"><div class="spin"></div>Recherche web en cours...</div><div class="tdots"><span></span><span></span><span></span></div></div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}function rmTyp(){const e=document.getElementById('typ');if(e)e.remove()}function card(d){const p=d.pronostics,a=d.analysis,cg=d.niveau_confiance_global||65;const lb={forme_domicile:['🏠','Domicile'],forme_exterieur:['✈️','Extérieur'],h2h:['⚔️','H2H'],motivation:['🔥','Motivation'],blessures:['🏥','Blessés']};const ar=Object.entries(a).map(([k,v])=>{const[i,l]=lb[k]||['•',k];return'<div class="ar">'+i+' <span style="flex:1;color:#4A6A85">'+l+' — <span style="color:#DCE8F5">'+v.detail+'</span></span><div class="abar"><div class="af" style="width:'+v.score+'%"></div></div></div>'}).join('');const sc=(d.buteurs_potentiels||[]).map(b=>'<div class="chip">⚽ '+b.nom+' <span style="color:#4A6A85;font-size:8px">('+b.equipe+')</span> <span class="sp">'+b.probabilite+'%</span></div>').join('');const sr=(d.web_sources||[]).map(s=>'<span class="stag">🔗 '+s+'</span>').join(' ');const wt=d.is_world_cup?'<div class="wct">🏆 CDM 2026'+(d.group?' · '+d.group:'')+'</div>':'';const fc=col(cg);return'<div class="card"><div class="ch"><div><div class="ct">'+d.match+'</div><div class="cm">'+d.competition+' · '+d.date_info+'</div>'+wt+'</div><div style="text-align:right"><div style="font-size:9px;color:#4A6A85">CONFIANCE</div><div style="font-size:28px;font-weight:900;color:'+fc+'">'+cg+'%</div></div></div><div class="grid"><div class="cell"><div class="cl">1X2</div><div class="cv" style="color:'+col(p.resultat_1x2.confiance)+'">'+p.resultat_1x2.valeur+'</div><div class="cc '+cc(p.resultat_1x2.confiance)+'">'+p.resultat_1x2.confiance+'% · '+p.resultat_1x2.label+'</div></div><div class="cell"><div class="cl">Over/Under</div><div class="cv" style="color:'+col(p.over_under.confiance)+'">'+p.over_under.valeur+'</div><div class="cc '+cc(p.over_under.confiance)+'">'+p.over_under.confiance+'%</div></div><div class="cell"><div class="cl">BTTS</div><div class="cv" style="color:'+col(p.btts.confiance)+'">'+p.btts.valeur+'</div><div class="cc '+cc(p.btts.confiance)+'">'+p.btts.confiance+'%</div></div><div class="cell"><div class="cl">Score Exact</div><div class="cv" style="color:'+col(p.score_exact.confiance)+';font-size:15px">'+p.score_exact.valeur+'</div><div class="cc '+cc(p.score_exact.confiance)+'">'+p.score_exact.confiance+'%</div></div><div class="cell"><div class="cl">🏆 Winner</div><div class="cv" style="color:#00FF87;font-size:12px;padding-top:3px">'+p.winner.valeur+'</div><div class="cc gh">'+p.winner.confiance+'%</div></div><div class="cell"><div class="cl">❌ Perdant</div><div class="cv" style="color:#FF4560;font-size:12px;padding-top:3px">'+p.perdant.valeur+'</div><div class="cc gl">'+p.perdant.confiance+'%</div></div></div><div class="ab"><div class="at">📡 Analyse temps réel</div>'+ar+'</div><div class="sc"><div class="sc-lbl">⚽ Buteurs potentiels</div>'+sc+'</div><div class="vb"><div class="vbg '+bc(p.resultat_1x2.valeur)+'">'+p.resultat_1x2.label.toUpperCase()+'</div><div style="flex:1;font-size:11px;color:#4A6A85;line-height:1.5">'+d.verdict+'</div></div>'+(sr?'<div class="src"><span style="font-size:9px;color:#4A6A85">SOURCES :</span>'+sr+'</div>':'')+'</div>';}async function send(){if(load)return;const t=inp.value.trim();if(!t)return;inp.value='';rs(inp);add('user',t);load=true;sb.disabled=true;showTyping();try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({match:t})});const data=await r.json();rmTyp();if(data.error)throw new Error(data.error);const w=document.createElement('div');w.className='msg bot';w.innerHTML='<div class="av bot">🤖</div><div style="flex:1;max-width:calc(100% - 38px)">'+card(data)+'</div>';chat.appendChild(w);chat.scrollTop=chat.scrollHeight;}catch(err){rmTyp();add('bot','❌ Erreur : '+err.message);}load=false;sb.disabled=false;}</script></body></html>
