<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pronostics IA Pro</title>

<style>
:root{
  --bg:#030914;
  --bg2:#071322;
  --card:#0b1828;
  --card2:#101f33;
  --line:rgba(255,255,255,.12);
  --text:#f4f7fb;
  --muted:#9aa7b8;
  --soft:#c8d0dc;
  --green:#18f5a6;
  --gold:#f5c542;
  --red:#ff5570;
  --shadow:0 18px 55px rgba(0,0,0,.45);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(24,245,166,.13), transparent 30%),
    radial-gradient(circle at 90% 6%, rgba(245,197,66,.12), transparent 28%),
    linear-gradient(180deg,#020712 0%,#071322 46%,#030914 100%);
  color:var(--text);
}

body{
  padding-bottom:100px;
}

button,input{
  font-family:inherit;
}

button{
  cursor:pointer;
}

.app{
  width:100%;
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  padding:18px 16px 115px;
  position:relative;
  overflow:hidden;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}

.icon-btn{
  width:44px;
  height:44px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:11px;
}

.logo{
  width:50px;
  height:50px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:27px;
  background:
    radial-gradient(circle, rgba(255,255,255,.18), transparent 62%),
    linear-gradient(145deg, rgba(245,197,66,.25), rgba(24,245,166,.20));
  border:1px solid rgba(245,197,66,.55);
  box-shadow:0 0 25px rgba(24,245,166,.25);
}

.brand-title{
  line-height:1.05;
}

.brand-title strong{
  display:block;
  letter-spacing:2px;
  font-size:18px;
}

.brand-title span{
  display:block;
  margin-top:4px;
  letter-spacing:2px;
  font-weight:900;
  font-size:18px;
}

.ia{
  color:var(--gold);
}

.pro{
  color:var(--green);
}

.top-tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:14px;
  scrollbar-width:none;
}

.top-tabs::-webkit-scrollbar{
  display:none;
}

.tab-btn{
  flex:0 0 auto;
  border:1px solid var(--line);
  color:var(--soft);
  background:rgba(255,255,255,.045);
  padding:11px 15px;
  border-radius:17px;
  font-weight:800;
  font-size:14px;
}

.tab-btn.active{
  color:#03150f;
  background:linear-gradient(135deg,var(--green),#68ffd0);
  box-shadow:0 0 28px rgba(24,245,166,.28);
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.hero{
  border:1px solid rgba(24,245,166,.35);
  border-radius:28px;
  overflow:hidden;
  padding:18px;
  margin-bottom:16px;
  background:
    radial-gradient(circle at 15% 20%,rgba(24,245,166,.18),transparent 28%),
    radial-gradient(circle at 90% 0%,rgba(245,197,66,.18),transparent 32%),
    linear-gradient(145deg,#0b192b,#06101e);
  box-shadow:var(--shadow),0 0 45px rgba(24,245,166,.10);
}

.hero-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:18px;
}

.label{
  color:var(--gold);
  font-weight:900;
  letter-spacing:1.6px;
  font-size:13px;
  text-transform:uppercase;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
  color:var(--gold);
  border:1px solid rgba(245,197,66,.45);
  background:rgba(245,197,66,.08);
}

.match-hero{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:14px;
  align-items:center;
  margin:14px 0 18px;
}

.team{
  text-align:center;
}

.flag{
  width:62px;
  height:62px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:38px;
  margin:0 auto 10px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.18);
}

.team strong{
  display:block;
  font-size:17px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.team small{
  display:block;
  color:var(--green);
  margin-top:5px;
  font-weight:800;
}

.vs{
  width:62px;
  height:62px;
  border-radius:18px;
  display:grid;
  place-items:center;
  color:var(--green);
  font-size:23px;
  font-weight:950;
  border:1px solid rgba(24,245,166,.45);
  background:rgba(24,245,166,.07);
}

.hero-meta{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
  color:var(--soft);
  font-weight:650;
  font-size:13px;
}

.confidence-box{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
  padding:14px;
  border-radius:20px;
  border:1px solid rgba(24,245,166,.34);
  background:rgba(0,0,0,.25);
}

.confidence-left span{
  display:block;
  color:var(--muted);
  font-size:11px;
  letter-spacing:1.2px;
  font-weight:900;
  text-transform:uppercase;
}

.confidence-left strong{
  display:block;
  color:var(--green);
  font-size:30px;
  line-height:1.1;
}

.progress{
  height:5px;
  width:100%;
  margin-top:8px;
  overflow:hidden;
  border-radius:999px;
  background:rgba(255,255,255,.12);
}

.progress i{
  display:block;
  height:100%;
  width:72%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--green),var(--gold));
}

.cta{
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,var(--green),#64ffd0);
  color:#03150f;
  font-size:14px;
  font-weight:950;
  padding:14px 16px;
}

.stats-strip{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:18px;
}

.stat-mini{
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.045);
  padding:12px 8px;
  text-align:center;
}

.stat-mini b{
  display:block;
  font-size:20px;
}

.stat-mini span{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:10px;
  font-weight:750;
}

.section{
  margin:20px 0;
}

.section-head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  margin-bottom:12px;
  gap:10px;
}

.section-title{
  font-size:17px;
  letter-spacing:1.7px;
  font-weight:950;
  text-transform:uppercase;
}

.link-btn{
  color:var(--green);
  font-weight:850;
  font-size:13px;
  border:none;
  background:transparent;
  padding:8px;
  border-radius:12px;
}

.match-list{
  display:grid;
  gap:11px;
}

.match-card{
  width:100%;
  border-radius:20px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.045);
  padding:14px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:13px;
  align-items:center;
  color:var(--text);
  text-align:left;
}

.match-time{
  min-width:58px;
}

.match-time b{
  display:block;
  font-size:19px;
}

.match-time span{
  color:var(--muted);
  font-size:12px;
}

.match-teams{
  display:grid;
  gap:7px;
  font-weight:900;
  letter-spacing:1px;
}

.match-odds{
  text-align:right;
  min-width:76px;
}

.match-odds strong{
  display:block;
  color:var(--gold);
  border:1px solid rgba(245,197,66,.35);
  border-radius:12px;
  padding:6px 8px;
}

.match-odds span{
  display:block;
  color:var(--green);
  margin-top:6px;
  font-size:12px;
  font-weight:850;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.feature{
  min-height:144px;
  border-radius:24px;
  border:1px solid var(--line);
  color:var(--text);
  text-align:left;
  background:
    radial-gradient(circle at 50% 0%,rgba(24,245,166,.13),transparent 40%),
    linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));
  padding:16px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.feature.gold{
  border-color:rgba(245,197,66,.32);
  background:
    radial-gradient(circle at 50% 0%,rgba(245,197,66,.14),transparent 40%),
    linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));
}

.ico{
  width:46px;
  height:46px;
  border-radius:16px;
  display:grid;
  place-items:center;
  font-size:27px;
  color:var(--green);
  background:rgba(24,245,166,.10);
}

.feature.gold .ico{
  color:var(--gold);
  background:rgba(245,197,66,.10);
}

.feature h3{
  margin:12px 0 6px;
  font-size:16px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.feature p{
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}

.arrow{
  margin-top:14px;
  width:34px;
  height:34px;
  border-radius:50%;
  display:grid;
  place-items:center;
  color:var(--green);
  border:1px solid rgba(24,245,166,.40);
}

.quick{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.quick-card{
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.045);
  padding:13px 10px;
  text-align:center;
}

.quick-card .num{
  font-size:26px;
  color:var(--green);
  font-weight:950;
}

.quick-card small{
  color:var(--muted);
  display:block;
  margin-top:6px;
}

.search-panel{
  border-radius:26px;
  border:1px solid rgba(24,245,166,.25);
  background:rgba(255,255,255,.045);
  padding:15px;
  margin-top:18px;
}

.search-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:950;
  letter-spacing:1px;
  margin-bottom:10px;
}

.input-row{
  display:flex;
  gap:10px;
}

.input-row input{
  flex:1;
  min-width:0;
  border:1px solid rgba(24,245,166,.38);
  background:#061322;
  color:var(--text);
  border-radius:18px;
  padding:16px 14px;
  outline:none;
  font-size:15px;
}

.input-row button{
  width:58px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,var(--green),#5dffcf);
  color:#03150f;
  font-size:22px;
  font-weight:950;
}

.samples{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.sample{
  border:none;
  border-radius:999px;
  color:var(--soft);
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  padding:8px 10px;
  font-size:12px;
  font-weight:750;
}

.loader{
  display:none;
  margin-top:12px;
  color:var(--green);
  font-weight:900;
}

.loader.show{
  display:block;
}

.error{
  display:none;
  margin-top:12px;
  border:1px solid rgba(255,85,112,.35);
  background:rgba(255,85,112,.09);
  color:#ffd4db;
  border-radius:18px;
  padding:13px;
  line-height:1.45;
}

.error.show{
  display:block;
}

.result{
  margin-top:16px;
  display:none;
}

.result.show{
  display:block;
}

.result-card{
  border-radius:26px;
  border:1px solid rgba(24,245,166,.28);
  background:
    radial-gradient(circle at 100% 0%,rgba(245,197,66,.12),transparent 34%),
    linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
  box-shadow:var(--shadow);
  overflow:hidden;
}

.result-header{
  padding:18px;
  border-bottom:1px solid var(--line);
}

.result-status{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border-radius:999px;
  padding:8px 11px;
  font-weight:950;
  font-size:12px;
  letter-spacing:1px;
  margin-bottom:12px;
  color:var(--green);
  background:rgba(24,245,166,.10);
  border:1px solid rgba(24,245,166,.28);
  text-transform:uppercase;
}

.result-status.finished{
  color:var(--red);
  background:rgba(255,85,112,.10);
  border-color:rgba(255,85,112,.32);
}

.result-header h2{
  margin:0;
  font-size:22px;
  letter-spacing:1px;
}

.result-header p{
  margin:8px 0 0;
  color:var(--muted);
  line-height:1.45;
}

.result-main{
  padding:18px;
}

.pick-card{
  border-radius:20px;
  border:1px solid rgba(245,197,66,.30);
  background:rgba(245,197,66,.08);
  padding:15px;
  margin-bottom:14px;
}

.pick-card small{
  color:var(--gold);
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:1px;
}

.pick-card h3{
  margin:7px 0;
  font-size:20px;
}

.pick-card p{
  color:var(--soft);
  margin:0;
  line-height:1.45;
}

.pred-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:12px;
}

.pred{
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(0,0,0,.22);
  padding:12px;
}

.pred span{
  color:var(--muted);
  display:block;
  font-size:11px;
  letter-spacing:.8px;
  text-transform:uppercase;
  font-weight:900;
}

.pred b{
  display:block;
  margin-top:7px;
  font-size:17px;
  color:var(--green);
}

.pred small{
  display:block;
  margin-top:5px;
  color:var(--soft);
}

.analysis{
  margin-top:14px;
  display:grid;
  gap:10px;
}

.analysis-box{
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  padding:13px;
}

.analysis-box b{
  display:block;
  color:var(--green);
  margin-bottom:6px;
}

.analysis-box p{
  margin:0;
  color:var(--soft);
  line-height:1.45;
}

.warn{
  margin-top:14px;
  border-radius:18px;
  border:1px solid rgba(245,197,66,.28);
  background:rgba(245,197,66,.08);
  padding:12px;
  color:#ffe7a5;
  line-height:1.45;
  font-size:13px;
}

.table-card{
  border-radius:22px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.045);
  padding:14px;
  margin-bottom:10px;
}

.table-card h3{
  margin:0 0 10px;
}

.group-row{
  display:flex;
  justify-content:space-between;
  color:var(--soft);
  border-top:1px solid var(--line);
  padding:10px 0;
}

.group-row:first-of-type{
  border-top:0;
}

.vip-card{
  border-radius:26px;
  border:1px solid rgba(245,197,66,.38);
  background:
    radial-gradient(circle at 80% 10%,rgba(245,197,66,.24),transparent 34%),
    linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
  padding:18px;
}

.vip-card h2{
  margin:0 0 8px;
  font-size:30px;
}

.vip-card p{
  color:var(--soft);
}

.vip-price{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.price{
  border-radius:20px;
  border:1px solid var(--line);
  padding:13px 9px;
  text-align:center;
  background:rgba(0,0,0,.22);
}

.price.vip{
  border-color:rgba(245,197,66,.65);
}

.price b{
  display:block;
  color:var(--green);
  font-size:21px;
}

.price.vip b{
  color:var(--gold);
}

.price small{
  color:var(--muted);
}

.community-card{
  border-radius:22px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.045);
  padding:14px;
  margin-bottom:12px;
}

.community-top{
  display:flex;
  align-items:center;
  gap:12px;
}

.avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:rgba(24,245,166,.12);
  border:1px solid rgba(24,245,166,.30);
  font-size:22px;
}

.community-card h3{
  margin:0;
}

.community-card small{
  color:var(--muted);
}

.community-card p{
  color:var(--soft);
  line-height:1.45;
}

.pill-mini{
  display:inline-block;
  border-radius:10px;
  border:1px solid rgba(24,245,166,.35);
  color:var(--green);
  padding:5px 9px;
  font-weight:900;
}

.bottom-nav{
  position:fixed;
  z-index:30;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  width:min(540px, calc(100% - 24px));
  height:76px;
  border-radius:26px;
  background:rgba(7,19,34,.88);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.12);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  box-shadow:0 20px 50px rgba(0,0,0,.50);
  overflow:hidden;
}

.nav-item{
  border:none;
  background:transparent;
  color:var(--muted);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-weight:750;
  font-size:12px;
}

.nav-item i{
  font-style:normal;
  font-size:23px;
}

.nav-item.active{
  color:var(--green);
  background:radial-gradient(circle at 50% 20%, rgba(24,245,166,.18), transparent 55%);
}

@media(max-width:390px){
  .app{
    padding-left:12px;
    padding-right:12px;
  }

  .stats-strip{
    grid-template-columns:repeat(2,1fr);
  }

  .grid{
    grid-template-columns:1fr;
  }

  .hero{
    padding:15px;
  }

  .team strong{
    font-size:15px;
  }

  .flag{
    width:54px;
    height:54px;
    font-size:32px;
  }

  .vs{
    width:54px;
    height:54px;
  }

  .confidence-box{
    grid-template-columns:1fr;
  }

  .cta{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="app">

  <header class="topbar">
    <button class="icon-btn" type="button" onclick="goPage('home')">☰</button>

    <div class="brand" onclick="goPage('home')">
      <div class="logo">⚽</div>
      <div class="brand-title">
        <strong>PRONOSTICS</strong>
        <span><span class="ia">IA</span> <span class="pro">PRO</span></span>
      </div>
    </div>

    <button class="icon-btn" type="button" onclick="showToast('Les notifications arrivent dans la prochaine version.')">🔔</button>
  </header>

  <div class="top-tabs">
    <button class="tab-btn active" type="button" data-page="home" onclick="goPage('home')">🎯 Pronostics</button>
    <button class="tab-btn" type="button" data-page="matchs" onclick="goPage('matchs')">⚽ Matchs</button>
    <button class="tab-btn" type="button" data-page="live" onclick="goPage('live')">📡 Live</button>
    <button class="tab-btn" type="button" data-page="community" onclick="goPage('community')">👥 Communauté</button>
    <button class="tab-btn" type="button" data-page="vip" onclick="goPage('vip')">👑 VIP</button>
    <button class="tab-btn" type="button" data-page="groups" onclick="goPage('groups')">🏆 Groupes</button>
  </div>

  <main id="home" class="page active">

    <section class="hero">
      <div class="hero-top">
        <div class="label">🏆 Coupe du Monde 2026</div>
        <div class="badge">🏆 CDM 2026</div>
      </div>

      <div class="match-hero">
