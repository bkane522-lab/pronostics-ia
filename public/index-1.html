<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pronostics IA Pro</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#04070B;color:#E2EEF8;font-family:sans-serif;display:flex;flex-direction:column;height:100vh}header{background:#070D14;border-bottom:1px solid #0F1E2E;padding:0 14px;display:flex;align-items:center;gap:10px;height:52px;flex-shrink:0}.logo{width:34px;height:34px;background:linear-gradient(135deg,#00FF87,#00BFFF);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}.ht{font-size:15px;font-weight:800;color:#00FF87}.hs{font-size:9px;color:#3A6A8A}.wc{margin-left:auto;background:#2A1A00;border:1px solid #FFD70055;border-radius:14px;padding:4px 10px;font-size:9px;color:#FFD700;display:flex;align-items:center;gap:5px}.dot{width:5px;height:5px;border-radius:50%;background:#00FF87;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.mbar{background:#070D14;border-bottom:1px solid #0F1E2E;padding:8px 12px;overflow-x:auto;white-space:nowrap;flex-shrink:0}.mbar::-webkit-scrollbar{display:none}.mlbl{font-size:8px;color:#3A6A8A;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}.mscroll{display:flex;gap:5px}.mc{display:inline-flex;align-items:center;background:#0A1420;border:1px solid #0F2030;border-radius:20px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;color:#E2EEF8}.mc.wc{border-color:#FFD70033;color:#FFD700}.mc.hot{border-color:#FF456066;color:#FF6B6B}#chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}.msg{display:flex;gap:8px}.user{flex-direction:row-reverse;margin-left:auto}.av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:#0A1420;border:1px solid #0F2030}.av.b{background:#001A0F;border-color:#00FF8744}.bub{background:#070D14;border:1px solid #0F1E2E;border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.6;max-width:calc(100% - 38px)}.user .bub{background:#001A3A;border-color:#003366}.card{background:#070D14;border:1px solid #0F2030;border-radius:14px;overflow:hidden;width:100%}.ch{background:#060B12;border-bottom:1px solid #0F2030;padding:13px 14px;display:flex;justify-content:space-between}.cn{font-size:18px;font-weight:800}.cm{font-size:9px;color:#3A6A8A;margin-top:3px}.wct{background:#1A0F00;border:1px solid #FFD70044;border-radius:5px;padding:2px 8px;font-size:9px;color:#FFD700;margin-top:4px;display:inline-block}.cb{text-align:right}.cl2{font-size:8px;color:#3A6A8A}.cv{font-size:28px;font-weight:900}.pj{background:#0A1F0A;border:1px solid #00FF8733;border-radius:10px;padding:10px 14px;margin:10px 14px 0}.pjt{font-size:8px;color:#00FF87;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}.pjv{font-size:13px;font-weight:700}.pjr{font-size:10px;color:#3A6A8A;margin-top:3px}.pjc{display:inline-block;background:#00FF8722;border:1px solid #00FF8755;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;color:#00FF87;margin-top:5px}.sb{border-top:1px solid #0F2030;padding:10px 14px;background:#060B12}.sbt{font-size:8px;color:#38BFFF;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px}.si{background:#0A1520;border:1px solid #0F2030;border-radius:8px;padding:8px 10px}.sl{font-size:8px;color:#3A6A8A;margin-bottom:3px}.sv{font-size:15px;font-weight:800}.ss{font-size:9px;color:#3A6A8A;margin-top:2px}.rp{background:#0A1520;border:1px solid #38BFFF22;border-radius:8px;padding:8px 10px;margin-top:5px;font-size:10px;color:#A0C4E8;line-height:1.5}.stl{font-size:8px;color:#3A6A8A;text-transform:uppercase;letter-spacing:1px;padding:10px 14px 6px;border-top:1px solid #0F2030}.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#0F2030}.pg3{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#0F2030}.pc{background:#070D14;padding:11px 8px;text-align:center}.pl{font-size:8px;color:#3A6A8A;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}.pv{font-size:15px;font-weight:800;line-height:1.2}.pf{font-size:9px;margin-top:2px}.pk{font-size:9px;color:#FFB800;margin-top:2px}.gh{color:#00FF87}.gm{color:#FFB800}.gl{color:#FF4560}.aa{border-top:1px solid #0F2030;padding:10px 14px}.aat{font-size:8px;color:#3A6A8A;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}.ag{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}.ai{background:#0A1520;border:1px solid #0F2030;border-radius:8px;padding:8px 10px}.ail{font-size:8px;color:#3A6A8A;margin-bottom:3px}.aiv{font-size:10px;color:#A0C4E8;line-height:1.4}.fk{margin:0 0 8px;background:#0A1520;border:1px solid #FFB80033;border-radius:8px;padding:8px 10px;font-size:10px;color:#FFB800}.ar{display:flex;align-items:center;gap:7px;font-size:10px;margin-bottom:4px}.abar{width:45px;height:3px;background:#0F2030;border-radius:2px;overflow:hidden;flex-shrink:0}.af{height:100%;border-radius:2px;background:linear-gradient(90deg,#00FF87,#00BFFF)}.sc{border-top:1px solid #0F2030;padding:10px 14px;display:flex;flex-wrap:wrap;gap:5px}.sct{width:100%;font-size:8px;color:#3A6A8A;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}.chip{background:#0A1520;border:1px solid #0F2030;border-radius:14px;padding:4px 9px;font-size:10px;display:flex;align-items:center;gap:4px}.sp{font-size:9px;color:#00FF87}.sk{font-size:9px;color:#FFB800}.vb{padding:10px 14px;border-top:1px solid #0F2030;display:flex;align-items:center;gap:9px}.vg{font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 10px;border-radius:6px;border:1px solid;flex-shrink:0}.bw{color:#00FF87;border-color:#00FF8766;background:#00FF8711}.bd{color:#FFB800;border-color:#FFB80066;background:#FFB80011}.bl{color:#FF4560;border-color:#FF456066;background:#FF456011}.ld{display:flex;align-items:center;gap:6px;font-size:10px;color:#38BFFF;padding:7px 10px;background:#001A2A;border:1px solid #38BFFF22;border-radius:8px;margin-bottom:6px}.spin{width:8px;height:8px;border:2px solid #38BFFF22;border-top-color:#38BFFF;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.dots{display:flex;gap:4px;padding:10px 13px;background:#070D14;border:1px solid #0F1E2E;border-radius:10px}.dots span{width:5px;height:5px;border-radius:50%;background:#00FF87;animation:bounce 1.2s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-6px);opacity:1}}.inp{background:#060B12;border-top:1px solid #0F1E2E;padding:10px 12px 16px;flex-shrink:0}.ir{display:flex;gap:8px;align-items:flex-end}.iw{flex:1;background:#0A1520;border:2px solid #00FF87;border-radius:11px;display:flex;align-items:flex-end;padding:2px}textarea{flex:1;background:transparent;border:none;color:#E2EEF8;font-size:14px;padding:8px 10px;resize:none;min-height:40px;max-height:80px;outline:none;line-height:1.4}textarea::placeholder{color:#2A4A6A}#btn{background:linear-gradient(135deg,#00FF87,#00CC6A);color:#04070B;border:none;border-radius:9px;width:44px;height:44px;cursor:pointer;font-size:19px;font-weight:900;flex-shrink:0}#btn:disabled{background:#0F2030;cursor:not-allowed}.disc{font-size:8px;color:#2A4A6A;text-align:center;padding:5px 0 0}</style></head><body>
<header><div class="logo">&#x26BD;</div><div><div class="ht">PRONOSTICS IA PRO</div><div class="hs">STATS · COTES · CDM 2026</div></div><div class="wc"><div class="dot"></div>CDM 2026</div></header>
<div class="mbar"><div class="mlbl">CDM 2026 - Glisse et clique</div><div class="mscroll" id="ms"></div></div>
<div id="chat"><div class="msg"><div class="av b">&#x1F916;</div><div class="bub"><strong style="color:#00FF87">Pronostics IA Pro</strong> en ligne !<br><br>Stats buts/match - Rapport de force - Cotes bookmaker - Pari du jour<br><br>Clique un match en haut ou tape ci-dessous</div></div></div>
<div class="inp"><div class="ir"><div class="iw"><textarea id="txt" placeholder="Ex: France vs Senegal CDM 2026..." rows="1"></textarea></div><button id="btn">&#x25BA;</button></div><p class="disc">Pronostics indicatifs - Jouer avec moderation</p></div>
<script>
var MATCHS=[
['Coree-Tcheque','Coree du Sud vs Republique Tcheque CDM 2026','hot'],
['Canada-Bosnie','Canada vs Bosnie CDM 2026','wc'],
['USA-Paraguay','USA vs Paraguay CDM 2026','wc'],
['Oranje-Japon','Pays-Bas vs Japon CDM 2026','wc'],
['Allemagne-Curacao','Allemagne vs Curacao CDM 2026','wc'],
['France-Senegal','France vs Senegal CDM 2026','wc'],
['Espagne-Cap Vert','Espagne vs Cap Vert CDM 2026','wc'],
['Bresil-Maroc','Bresil vs Maroc CDM 2026','wc'],
['Argentine','Argentine CDM 2026','wc'],
['Portugal','Portugal CDM 2026','wc'],
['Angleterre','Angleterre CDM 2026','wc'],
['Belgique','Belgique CDM 2026','wc'],
['Uruguay','Uruguay CDM 2026','wc'],
['Maroc','Maroc CDM 2026','wc'],
['Senegal','Senegal CDM 2026','wc'],
['Nigeria','Nigeria CDM 2026','wc'],
['Japon','Japon CDM 2026','wc'],
['Mexique','Mexique CDM 2026','wc']
];
var ms=document.getElementById('ms');
for(var i=0;i<MATCHS.length;i++){
  var m=MATCHS[i];
  var d=document.createElement('div');
  d.className='mc '+m[2];
  d.textContent=m[0];
  (function(q){d.addEventListener('click',function(){send(q);});})(m[1]);
  ms.appendChild(d);
}
var chat=document.getElementById('chat');
var txt=document.getElementById('txt');
var btn=document.getElementById('btn');
var busy=false;
txt.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';});
txt.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(this.value);}});
btn.addEventListener('click',function(){send(txt.value);});
function col(v){return v>=70?'#00FF87':v>=50?'#FFB800':'#FF4560';}
function cc(v){return v>=70?'gh':v>=50?'gm':'gl';}
function bc(v){var s=(v||'').toLowerCase();if(s==='1'||s.indexOf('victoire')>=0)return'bw';if(s==='x'||s.indexOf('nul')>=0)return'bd';return'bl';}
function addMsg(role,html){
  var d=document.createElement('div');d.className='msg'+(role==='user'?' user':'');
  var av=document.createElement('div');av.className='av'+(role==='bot'?' b':'');av.textContent=role==='bot'?'AI':'U';
  var b=document.createElement('div');b.className='bub';b.innerHTML=html;
  d.appendChild(av);d.appendChild(b);chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function showLoad(){
  var d=document.createElement('div');d.className='msg';d.id='ld';
  d.innerHTML='<div class="av b">AI</div><div><div class="ld"><div class="spin"></div>Analyse en cours...</div><div class="dots"><span></span><span></span><span></span></div></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function rmLoad(){var e=document.getElementById('ld');if(e)e.remove();}
function cell(lbl,val,conf,cote){
  if(!val)return'';
  return'<div class="pc"><div class="pl">'+lbl+'</div><div class="pv" style="color:'+col(conf)+'">'+val+'</div><div class="pf '+cc(conf)+'">'+conf+'%</div>'+(cote?'<div class="pk">~'+cote+'</div>':'')+'</div>';
}
function buildCard(d){
  var p=d.pronostics||{},a=d.analysis||{},cg=d.niveau_confiance_global||65;
  var st=d.stats_techniques,aa=d.analyse_approfondie,pj=d.pari_du_jour;
  var fc=col(cg);
  var h='<div class="card">';
  h+='<div class="ch"><div><div class="cn">'+d.match+'</div><div class="cm">'+d.competition+' - '+d.date_info+'</div>'+(d.is_world_cup?'<div class="wct">CDM 2026'+(d.group?' - '+d.group:'')+'</div>':'')+'</div><div class="cb"><div class="cl2">CONFIANCE</div><div class="cv" style="color:'+fc+'">'+cg+'%</div></div></div>';
  if(pj)h+='<div class="pj"><div class="pjt">Pari du jour</div><div class="pjv">'+pj.type+' - '+pj.valeur+'</div><div class="pjr">'+pj.raison+'</div><span class="pjc">Cote ~'+pj.cote_estimee+'</span></div>';
  if(st){
    function dc(v){return v<1?'#00FF87':v<1.5?'#FFB800':'#FF4560';}
    h+='<div class="sb"><div class="sbt">Statistiques techniques</div><div class="sg">';
    if(st.buts_marques_A)h+='<div class="si"><div class="sl">BUTS MARQUES/MATCH (A)</div><div class="sv" style="color:#38BFFF">'+st.buts_marques_A.valeur+'</div><div class="ss">'+st.buts_marques_A.detail+'</div></div>';
    if(st.buts_encaisses_A)h+='<div class="si"><div class="sl">BUTS ENCAISSES/MATCH (A)</div><div class="sv" style="color:'+dc(st.buts_encaisses_A.valeur)+'">'+st.buts_encaisses_A.valeur+'</div><div class="ss">'+st.buts_encaisses_A.detail+'</div></div>';
    if(st.buts_marques_B)h+='<div class="si"><div class="sl">BUTS MARQUES/MATCH (B)</div><div class="sv" style="color:#38BFFF">'+st.buts_marques_B.valeur+'</div><div class="ss">'+st.buts_marques_B.detail+'</div></div>';
    if(st.buts_encaisses_B)h+='<div class="si"><div class="sl">BUTS ENCAISSES/MATCH (B)</div><div class="sv" style="color:'+dc(st.buts_encaisses_B.valeur)+'">'+st.buts_encaisses_B.valeur+'</div><div class="ss">'+st.buts_encaisses_B.detail+'</div></div>';
    h+='</div>';
    if(st.rapport_force)h+='<div class="rp">'+st.rapport_force.detail+'</div>';
    h+='</div>';
  }
  h+='<div class="stl">Paris et Cotes estimees</div><div class="pg">';
  h+=cell('1X2',p.resultat_1x2&&p.resultat_1x2.valeur,p.resultat_1x2&&p.resultat_1x2.confiance,p.resultat_1x2&&p.resultat_1x2.cote_estimee);
  h+=cell('Over/Under',p.over_under&&p.over_under.valeur,p.over_under&&p.over_under.confiance,p.over_under&&p.over_under.cote_estimee);
  h+=cell('BTTS',p.btts&&p.btts.valeur,p.btts&&p.btts.confiance,p.btts&&p.btts.cote_estimee);
  h+=cell('Double Chance',p.double_chance&&p.double_chance.valeur,p.double_chance&&p.double_chance.confiance,p.double_chance&&p.double_chance.cote_estimee);
  h+=cell('Handicap',p.handicap&&p.handicap.valeur,p.handicap&&p.handicap.confiance,p.handicap&&p.handicap.cote_estimee);
  h+=cell('1er But',p.premier_but&&p.premier_but.valeur,p.premier_but&&p.premier_but.confiance,p.premier_but&&p.premier_but.cote_estimee);
  h+=cell('MT/Fin',p.mi_temps_fin&&p.mi_temps_fin.valeur,p.mi_temps_fin&&p.mi_temps_fin.confiance,p.mi_temps_fin&&p.mi_temps_fin.cote_estimee);
  h+=cell('Cage inviolee',p.cage_inviolee&&p.cage_inviolee.valeur,p.cage_inviolee&&p.cage_inviolee.confiance,p.cage_inviolee&&p.cage_inviolee.cote_estimee);
  h+=cell('Score Exact',p.score_exact&&p.score_exact.valeur,p.score_exact&&p.score_exact.confiance,p.score_exact&&p.score_exact.cote_estimee);
  h+='</div>';
  h+='<div class="pg3"><div class="pc" style="border-top:1px solid #0F2030"><div class="pl">WINNER</div><div class="pv" style="color:#00FF87;font-size:13px">'+(p.winner&&p.winner.valeur||'')+'</div><div class="pf gh">'+(p.winner&&p.winner.confiance||0)+'%</div></div>';
  h+='<div class="pc" style="border-top:1px solid #0F2030"><div class="pl">PERDANT</div><div class="pv" style="color:#FF4560;font-size:13px">'+(p.perdant&&p.perdant.valeur||'')+'</div><div class="pf gl">'+(p.perdant&&p.perdant.confiance||0)+'%</div></div>';
  h+='<div class="pc" style="border-top:1px solid #0F2030"><div class="pl">GLOBAL</div><div class="pv" style="color:'+fc+';font-size:15px">'+cg+'%</div></div></div>';
  if(aa){
    h+='<div class="aa"><div class="aat">Analyse approfondie</div><div class="ag">';
    if(aa.forces_A)h+='<div class="ai"><div class="ail">FORCES A</div><div class="aiv">'+aa.forces_A+'</div></div>';
    if(aa.faiblesses_A)h+='<div class="ai"><div class="ail">FAIBLESSES A</div><div class="aiv">'+aa.faiblesses_A+'</div></div>';
    if(aa.forces_B)h+='<div class="ai"><div class="ail">FORCES B</div><div class="aiv">'+aa.forces_B+'</div></div>';
    if(aa.faiblesses_B)h+='<div class="ai"><div class="ail">FAIBLESSES B</div><div class="aiv">'+aa.faiblesses_B+'</div></div>';
    h+='</div>';
    if(aa.facteur_cle)h+='<div class="fk">'+aa.facteur_cle+'</div>';
    h+='</div>';
  }
  var lb={forme_domicile:['Domicile'],forme_exterieur:['Exterieur'],h2h:['H2H'],motivation:['Motivation'],blessures:['Blesses']};
  var ar='';
  for(var k in a){if(a[k]&&a[k].detail){var l=lb[k]?lb[k][0]:k;ar+='<div class="ar"><span style="flex:1;color:#3A6A8A;font-size:10px">'+l+' - <span style="color:#A0C4E8">'+a[k].detail+'</span></span><div class="abar"><div class="af" style="width:'+(a[k].score||50)+'%"></div></div></div>';}}
  h+='<div class="aa"><div class="aat">Analyse combinee</div>'+ar+'</div>';
  var sc='';
  var bp=d.buteurs_potentiels||[];
  for(var i=0;i<bp.length;i++){var b=bp[i];sc+='<div class="chip"><strong>'+b.nom+'</strong> <span style="color:#3A6A8A;font-size:8px">('+b.equipe+')</span> <span class="sp">'+b.probabilite+'%</span>'+(b.cote_estimee?'<span class="sk">~'+b.cote_estimee+'</span>':'')+'</div>';}
  h+='<div class="sc"><div class="sct">Buteurs potentiels + cotes</div>'+sc+'</div>';
  var r1=p.resultat_1x2;
  h+='<div class="vb"><div class="vg '+bc(r1&&r1.valeur)+'">'+((r1&&r1.label)||'ANALYSE').toUpperCase()+'</div><div style="flex:1;font-size:11px;color:#3A6A8A;line-height:1.5">'+d.verdict+'</div></div>';
  h+='</div>';
  return h;
}
function send(q){
  var t=(q||txt.value).trim();
  if(!t||busy)return;
  txt.value='';txt.style.height='auto';
  addMsg('user',t);
  busy=true;btn.disabled=true;showLoad();
  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({match:t})})
  .then(function(r){return r.json();})
  .then(function(data){
    rmLoad();
    if(data.error)throw new Error(data.error);
    var w=document.createElement('div');w.className='msg';
    w.innerHTML='<div class="av b">AI</div><div style="flex:1;max-width:calc(100% - 38px)">'+buildCard(data)+'</div>';
    chat.appendChild(w);chat.scrollTop=chat.scrollHeight;
  })
  .catch(function(e){rmLoad();addMsg('bot','Erreur : '+e.message);})
  .finally(function(){busy=false;btn.disabled=false;});
}
</script>
</body></html>
